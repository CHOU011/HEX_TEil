<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex 串口校验位计算器</title>
    <style>
        :root {
            --bg: #0f1419;
            --surface: #1a2332;
            --surface-2: #243044;
            --border: #2d3a4f;
            --text: #e7ecf3;
            --muted: #8b9cb3;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #22c55e;
            --error: #ef4444;
            --mono: "Cascadia Code", "Consolas", "SF Mono", monospace;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: radial-gradient(ellipse at top, #1a2744 0%, var(--bg) 55%);
            color: var(--text);
            line-height: 1.5;
        }
        .container { max-width: 820px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
        header { margin-bottom: 2rem; }
        h1 { margin: 0 0 0.5rem; font-size: 1.75rem; font-weight: 700; }
        .subtitle { color: var(--muted); margin: 0; font-size: 0.95rem; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; }
        .hint { font-size: 0.8rem; color: var(--muted); margin-top: 0.35rem; }
        textarea {
            width: 100%;
            min-height: 110px;
            padding: 0.875rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-2);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: var(--accent); }
        textarea.invalid { border-color: var(--error); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 640px) { .row { grid-template-columns: 1fr; } }
        select {
            width: 100%;
            padding: 0.65rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface-2);
            color: var(--text);
            font-size: 0.95rem;
        }
        .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1rem; }
        button {
            padding: 0.6rem 1.1rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
        .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.25rem; }
        .bytes-preview {
            margin-top: 0.75rem;
            padding: 0.65rem 0.75rem;
            background: var(--surface-2);
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--muted);
            word-break: break-all;
        }
        .results { display: grid; gap: 0.75rem; }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1rem;
            background: var(--surface-2);
            border-radius: 8px;
            border: 1px solid transparent;
        }
        .result-item.highlight { border-color: var(--accent); background: rgba(59, 130, 246, 0.08); }
        .result-label { font-size: 0.875rem; color: var(--muted); }
        .result-value { font-family: var(--mono); font-size: 1.05rem; font-weight: 600; color: var(--success); cursor: pointer; }
        .section-title { margin: 0 0 0.75rem; font-size: 1rem; }
        footer { margin-top: 1.5rem; text-align: center; color: var(--muted); font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hex 串口校验位计算器</h1>
            <p class="subtitle">输入十六进制数据，计算常用串口校验位（支持空格、逗号、0x 前缀）</p>
        </header>
        <div class="card">
            <label for="hexInput">Hex 数据</label>
            <textarea id="hexInput" placeholder="例如: AA 55 01 02 03 或 AA55010203">AA 55 01 02 03</textarea>
            <div class="hint">自动忽略空格、逗号、换行；仅接受 0-9 A-F</div>
            <div id="errorMsg" class="error-msg"></div>
            <div id="bytesPreview" class="bytes-preview"></div>
            <div class="row" style="margin-top: 1rem;">
                <div>
                    <label for="algoSelect">校验算法</label>
                    <select id="algoSelect">
                        <option value="sum8">累加和 Sum8 (mod 256)</option>
                        <option value="xor8">异或校验 XOR8</option>
                        <option value="lrc">LRC (256 - sum mod 256)</option>
                        <option value="crc8">CRC-8 (poly 0x07, init 0x00)</option>
                        <option value="crc16-modbus">CRC-16 Modbus</option>
                        <option value="crc16-ccitt">CRC-16 CCITT (0x1021, init 0xFFFF)</option>
                        <option value="crc16-ibm">CRC-16 IBM / ANSI (0x8005)</option>
                    </select>
                </div>
                <div>
                    <label for="byteOrder">CRC-16 字节序</label>
                    <select id="byteOrder">
                        <option value="le">低字节在前 (Little Endian)</option>
                        <option value="be">高字节在前 (Big Endian)</option>
                    </select>
                </div>
            </div>
            <div class="actions">
                <button class="btn-primary" id="calcBtn">计算</button>
                <button class="btn-secondary" id="appendBtn">追加校验位到末尾</button>
                <button class="btn-secondary" id="clearBtn">清空</button>
            </div>
        </div>
        <div class="card">
            <h2 class="section-title">计算结果</h2>
            <div id="results" class="results">
                <div class="result-item highlight">
                    <span class="result-label">当前算法</span>
                    <span class="result-value" id="mainResult">--</span>
                </div>
            </div>
        </div>
        <div class="card">
            <h2 class="section-title">全部算法对照</h2>
            <div id="allResults" class="results"></div>
        </div>
        <footer>点击结果可复制 · 本地计算，数据不上传</footer>
    </div>
    <script>
        const hexInput = document.getElementById("hexInput");
        const algoSelect = document.getElementById("algoSelect");
        const byteOrder = document.getElementById("byteOrder");
        const errorMsg = document.getElementById("errorMsg");
        const bytesPreview = document.getElementById("bytesPreview");
        const mainResult = document.getElementById("mainResult");
        const allResults = document.getElementById("allResults");
        const ALGORITHMS = [
            { id: "sum8", name: "Sum8 累加和", calc: (bytes) => [sum8(bytes)] },
            { id: "xor8", name: "XOR8 异或", calc: (bytes) => [xor8(bytes)] },
            { id: "lrc", name: "LRC", calc: (bytes) => [lrc(bytes)] },
            { id: "crc8", name: "CRC-8", calc: (bytes) => [crc8(bytes)] },
            { id: "crc16-modbus", name: "CRC-16 Modbus", calc: (bytes) => crc16Modbus(bytes) },
            { id: "crc16-ccitt", name: "CRC-16 CCITT", calc: (bytes) => crc16Ccitt(bytes) },
            { id: "crc16-ibm", name: "CRC-16 IBM", calc: (bytes) => crc16Ibm(bytes) }
        ];
        function parseHex(input) {
            const cleaned = input.replace(/0x/gi, "").replace(/[\s,，;；]/g, "");
            if (cleaned.length === 0) return { bytes: [], error: null };
            if (cleaned.length % 2 !== 0) return { bytes: null, error: "Hex 长度必须为偶数（每个字节 2 个字符）" };
            if (!/^[0-9A-Fa-f]*$/.test(cleaned)) return { bytes: null, error: "包含非法字符，仅允许 0-9、A-F" };
            const bytes = [];
            for (let i = 0; i < cleaned.length; i += 2) bytes.push(parseInt(cleaned.slice(i, i + 2), 16));
            return { bytes, error: null };
        }
        function toHexByte(value) { return value.toString(16).toUpperCase().padStart(2, "0"); }
        function toHexBytes(values) { return values.map(toHexByte).join(" "); }
        function sum8(bytes) { return bytes.reduce((acc, b) => (acc + b) & 0xFF, 0); }
        function xor8(bytes) { return bytes.reduce((acc, b) => acc ^ b, 0); }
        function lrc(bytes) { return (256 - sum8(bytes)) & 0xFF; }
        function crc8(bytes) {
            let crc = 0x00;
            for (const byte of bytes) {
                crc ^= byte;
                for (let i = 0; i < 8; i++) crc = (crc & 0x80) ? ((crc << 1) ^ 0x07) & 0xFF : (crc << 1) & 0xFF;
            }
            return crc;
        }
        function crc16Generic(bytes, poly, init, refin, refout, xorout) {
            let crc = init;
            for (let byte of bytes) {
                if (refin) byte = reverseBits8(byte);
                crc ^= (byte << 8);
                for (let i = 0; i < 8; i++) crc = (crc & 0x8000) ? ((crc << 1) ^ poly) & 0xFFFF : (crc << 1) & 0xFFFF;
            }
            if (refout) crc = reverseBits16(crc);
            return (crc ^ xorout) & 0xFFFF;
        }
        function reverseBits8(value) {
            let result = 0;
            for (let i = 0; i < 8; i++) { result = (result << 1) | (value & 1); value >>= 1; }
            return result;
        }
        function reverseBits16(value) {
            let result = 0;
            for (let i = 0; i < 16; i++) { result = (result << 1) | (value & 1); value >>= 1; }
            return result;
        }
        function crc16Modbus(bytes) {
            const value = crc16Generic(bytes, 0xA001, 0xFFFF, true, true, 0x0000);
            return [value & 0xFF, (value >> 8) & 0xFF];
        }
        function crc16Ccitt(bytes) {
            const value = crc16Generic(bytes, 0x1021, 0xFFFF, false, false, 0x0000);
            return [(value >> 8) & 0xFF, value & 0xFF];
        }
        function crc16Ibm(bytes) {
            const value = crc16Generic(bytes, 0x8005, 0x0000, true, true, 0x0000);
            return [value & 0xFF, (value >> 8) & 0xFF];
        }
        function orderCrc16Bytes(bytesPair, order) {
            return order === "be" ? [bytesPair[1], bytesPair[0]] : bytesPair;
        }
        function formatResult(values, isCrc16) {
            if (!isCrc16) return `0x${toHexByte(values[0])} (${values[0]})`;
            const hex = toHexBytes(values);
            const num = values[0] | (values[1] << 8);
            return `${hex} (0x${num.toString(16).toUpperCase().padStart(4, "0")})`;
        }
        function renderResultItem(label, value, highlight) {
            const item = document.createElement("div");
            item.className = "result-item" + (highlight ? " highlight" : "");
            item.innerHTML = `<span class="result-label">${label}</span><span class="result-value">${value}</span>`;
            item.querySelector(".result-value").addEventListener("click", () => {
                navigator.clipboard.writeText(item.querySelector(".result-value").textContent).catch(() => {});
            });
            return item;
        }
        function calculate() {
            const { bytes, error } = parseHex(hexInput.value);
            hexInput.classList.toggle("invalid", !!error);
            errorMsg.textContent = error || "";
            if (error || bytes.length === 0) {
                bytesPreview.innerHTML = bytes && bytes.length === 0 ? "<strong>字节:</strong> （空）" : "";
                mainResult.textContent = "--";
                allResults.innerHTML = "";
                return null;
            }
            bytesPreview.innerHTML = `<strong>字节 (${bytes.length}):</strong> ${toHexBytes(bytes)}`;
            const selected = algoSelect.value;
            const order = byteOrder.value;
            const algo = ALGORITHMS.find((a) => a.id === selected);
            let values = algo.calc(bytes);
            const isCrc16 = selected.startsWith("crc16-");
            if (isCrc16) values = orderCrc16Bytes(values, order);
            mainResult.textContent = formatResult(values, isCrc16);
            allResults.innerHTML = "";
            for (const item of ALGORITHMS) {
                let result = item.calc(bytes);
                const is16 = item.id.startsWith("crc16-");
                if (is16) result = orderCrc16Bytes(result, order);
                allResults.appendChild(renderResultItem(item.name, formatResult(result, is16), item.id === selected));
            }
            return { bytes, values, isCrc16 };
        }
        function appendChecksum() {
            const result = calculate();
            if (!result) return;
            hexInput.value = toHexBytes(result.bytes.concat(result.values));
            calculate();
        }
        document.getElementById("calcBtn").addEventListener("click", calculate);
        document.getElementById("appendBtn").addEventListener("click", appendChecksum);
        document.getElementById("clearBtn").addEventListener("click", () => { hexInput.value = ""; calculate(); });
        hexInput.addEventListener("input", calculate);
        algoSelect.addEventListener("change", calculate);
        byteOrder.addEventListener("change", calculate);
        calculate();
    </script>
</body>
</html>
